name: Build & Push VTC Image

on:
  workflow_dispatch:
    inputs:
      vtc_version:
        description: "VTC version"
        required: true
        default: "0.10.12"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/vtc

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: VTC_VERSION=${{ inputs.vtc_version }}
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:${{ inputs.vtc_version }}
            ghcr.io/${{ env.IMAGE_NAME }}:latest
